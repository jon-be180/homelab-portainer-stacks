version: '3.8'

services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'   # Local HTTP
      - '81:81'   # Admin Panel
      - '443:443' # Local HTTPS
    environment:
      - TZ=America/Guatemala
    volumes:
      - ${SSD_PATH}/npm/data:/data
      - ${SSD_PATH}/npm/letsencrypt:/etc/letsencrypt
    networks:
      - proxy-tier
    depends_on:
      step-ca:
        condition: service_healthy

  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca
    restart: unless-stopped
    environment:
      - DOCKER_STEPCA_INIT_NAME=Jon-Home-CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=step-ca,step-ca.local,${LOCAL_IP}
      - DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT=true
      # We provide a password file to prevent the container from hanging on start
      - DOCKER_STEPCA_INIT_PASSWORD_FILE=/home/step/secrets/password.txt
      - TZ=America/Guatemala
    volumes:
      - ${SSD_PATH}/step-ca:/home/step
    networks:
      - proxy-tier
    healthcheck:
      test: ["CMD", "step", "ca", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    # Standardizing command for performance
    command: tunnel --no-autoupdate run
    networks:
      - proxy-tier
    depends_on:
      - nginx-proxy-manager

networks:
  proxy-tier:
    name: proxy-tier
    driver: bridge
