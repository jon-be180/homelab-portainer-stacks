version: '3.8'

services:
  immich_server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${EXTERNAL_PHOTOS}:/external-photos:ro
    ports:
      - '2283:2283'
    environment:
      - DB_HOSTNAME=immich_database
      - REDIS_HOSTNAME=immich_redis
    restart: always
    networks:
      - immich-net
    depends_on:
      immich_redis:
        condition: service_healthy
      immich_database:
        condition: service_healthy
      immich_machinelearning:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c ': </dev/tcp/127.0.0.1/2283' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  immich_machinelearning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    restart: always
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/ping').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  immich_redis:
    container_name: immich_redis
    image: docker.io/redis:alpine
    restart: always
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  immich_database:
    container_name: immich_database
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - immich-net
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1; 
        Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')"; 
        echo "checksum failure count is $$Chksum"; 
        [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    restart: always

  immich_cloudflared:
    container_name: immich_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - TUNNEL_METRICS=0.0.0.0:60123
    networks:
      - immich-net
    # Removed the strict "condition: service_healthy" block from here
    depends_on:
      - immich_server
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
volumes:
  model-cache:

networks:
  immich-net:
    driver: bridge
