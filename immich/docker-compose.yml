name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${EXTERNAL_PHOTOS}:/external-photos:ro
    ports:
      - '2283:2283'
    restart: always
    networks:
      - immich-net
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    # Re-enabled: Server check is safe to track now
    healthcheck:
      test: ["CMD", "immich-admin", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    restart: always
    networks:
      - immich-net
    # Fixed: Uses native python sockets to test port 3003 so we don't need 'curl'
    # Also bumped start_period to 3 minutes to allow heavy ML models to download on WSL2
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\", 3003))' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 3m

  redis:
    container_name: immich_redis
    image: docker.io/redis:alpine
    restart: always
    networks:
      - immich-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:739cdd626151ff1f796dc95a6591b55a714f341c737e27f045019ceabf8e8c52
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - immich-net
    healthcheck:
      test: >-
        pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1; 
        Chksum="$$(psql --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" --tuples-only --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM pg_stat_database')"; 
        echo "checksum failure count is $$Chksum"; 
        [ "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    command: >-
      postgres -c shared_preload_libraries=vectors.so -c 'search_path="$$user", public, vectors' -c logging_collector=on -c max_wal_size=2GB -c shared_buffers=512MB -c wal_compression=on
    restart: always

  cloudflared:
    container_name: immich_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --metrics localhost:2000 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - immich-net
    depends_on:
      immich-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "admin", "http://localhost:2000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
volumes:
  model-cache:

networks:
  immich-net:
    driver: bridge
