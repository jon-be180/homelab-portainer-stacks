services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=${WEB_PORT}
    volumes:
      - ${CONF_PATH}:/config
      - ${DATA_PATH}:/data
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${CONF_PATH}/radarr:/config
      - ${DATA_PATH}:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${CONF_PATH}/sonarr:/config
      - ${DATA_PATH}:/data
    ports:
      - 8989:8989
    restart: unless-stopped
