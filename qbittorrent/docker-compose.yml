services:
  qbittorrent_server:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=${WEB_PORT}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONF_PATH}:/config
      - ${DATA_PATH}:/downloads
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  radarr_server:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${RADARR_CONF_PATH}:/config
      - ${DATA_PATH}:/data
      - ${MOVIES_PATH}:/movies
    ports:
      - 7878:7878
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  sonarr_server:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${SONARR_CONF_PATH}:/config
      - ${DATA_PATH}:/data
      - ${SHOWS_PATH}:/shows
    ports:
      - 8989:8989
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

tdarr_server:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    ports:
      - "9425:8265" # WebUI
      - "9426:8266" # Server
      - "9427:8267" # Internal Node Sync
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - nodeName=MainNode
    volumes:
      # --- BULK STORAGE ---
      - ${DOCKER_DATA_PATH}/tdarr/server:/app/server
      - ${DOCKER_DATA_PATH}/tdarr/configs:/app/configs
      - ${DOCKER_DATA_PATH}/tdarr/logs:/app/logs
      # Your Media Libraries
      - ${MOVIES_PATH}:/media/movies
      - ${SHOWS_PATH}:/media/shows

      # --- HIGH SPEED CACHE ---
      - ${DOCKER_DATA_PATH}/tdarr/transcode_cache:/temp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8266/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

