services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=${WEB_PORT}
    volumes:
      - ${CONF_PATH}:/config
      - ${DATA_PATH}:/data
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
