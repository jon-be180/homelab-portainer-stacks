services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - WEBUI_PORT=${WEB_PORT}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONF_PATH}:/config
      - ${DATA_PATH}:/downloads
    ports:
      - ${WEB_PORT}:${WEB_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${RADARR_CONF_PATH}:/config
      - ${DATA_PATH}:/data
      - ${MOVIES_PATH}:/movies
    ports:
      - 7878:7878
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${SONARR_CONF_PATH}:/config
      - ${DATA_PATH}:/data
      - ${SHOWS_PATH}:/shows
    ports:
      - 8989:8989
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
