version: '3.8'

services:
  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Guatemala
    volumes:
      # Updated internal path to /etc/glance/glance.yml
      - ${GLANCE_STORAGE_PATH}/glance.yml:/etc/glance/glance.yml
      # Assets also typically live in /etc/glance/assets now if needed
      - ${GLANCE_STORAGE_PATH}/assets:/etc/glance/assets
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: homelab_network
