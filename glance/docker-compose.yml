version: '3.8'

services:
  glance_server:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Guatemala
    volumes:
      - ${GLANCE_STORAGE_PATH}/glance.yml:/etc/glance/glance.yml
      - ${GLANCE_STORAGE_PATH}/assets:/etc/glance/assets
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 45s
      timeout: 5s
      retries: 3
      start_period: 15s
