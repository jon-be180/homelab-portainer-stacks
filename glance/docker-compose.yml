version: '3.8'

services:
  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Guatemala
      # These variables allow you to switch storage via the Portainer UI
      - CONFIG_DIR=${GLANCE_STORAGE_PATH:-/home/user/glance/config}
    volumes:
      # Mount the config file from your chosen storage path
      - ${GLANCE_STORAGE_PATH:-./glance}/glance.yml:/app/glance.yml
      # Mount assets (icons, etc) if you want them persistent
      - ${GLANCE_STORAGE_PATH:-./glance}/assets:/app/assets
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: homelab_network
