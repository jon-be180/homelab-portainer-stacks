version: '3.8'

services:
  bitcoind:
    image: lncm/bitcoind:v26.0
    container_name: bitcoin_node
    restart: unless-stopped
    ports:
      - "8333:8333"  # Mainnet P2P
      - "8332:8332"  # RPC Port for Zeus / Portainer connections
    volumes:
      # Main data directory on the SSD (D:)
      - ${BITCOIN_DATA_PATH}:/data
      # Massive block storage offloaded to the HDD (E:)
      - ${BITCOIN_BLOCK_DATA_PATH}:/data/blocks
    environment:
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
    # FIXED: Switched from an array to a single raw string to stop the image wrapper from splitting flags incorrectly
    command: >
      bitcoind
      -chain=main
      -server=1
      -txindex=0
      -prune=5000
      -dbcache=8192
      -rpcuser=${BITCOIN_RPC_USER}
      -rpcpassword=${BITCOIN_RPC_PASSWORD}
      -rpcallowip=0.0.0.0/0
      -rpcbind=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -rpcuser=$$BITCOIN_RPC_USER -rpcpassword=$$BITCOIN_RPC_PASSWORD getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m
