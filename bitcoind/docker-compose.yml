version: '3.8'

services:
  bitcoind:
    image: lncm/bitcoind:v26.0
    container_name: bitcoin_node
    restart: unless-stopped
    ports:
      - "8333:8333"  # Mainnet P2P
      - "8332:8332"  # RPC Port
    command:
      - "-dbcache=500"
      - "-par=4"
      - "-assumevalid=000000000000000000021cbf3f9462615436d4df94eb6c9cf1fc2ff769e32a67"
      # Explicitly tell bitcoind to use /data as its root home
      - "-datadir=/data" 
    volumes:
      # Fast SSD data (chainstate, db, etc.)
      - ${BITCOIN_DATA_PATH}:/data
      # Slow HDD data (blocks) nested properly
      - ${BITCOIN_BLOCK_DATA_PATH}:/data/blocks
    environment:
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
      - BITCOIN_TXINDEX=1
      - BITCOIN_SERVER=1
      - BITCOIN_RPCBIND=0.0.0.0
      - BITCOIN_RPCALLOWIP=0.0.0.0/0

  electrs:
    image: romanz/electrs:v0.10.6
    container_name: electrs_indexer
    restart: unless-stopped
    depends_on:
      - bitcoind
    ports:
      - "50001:50001" # Electrum RPC
      - "3002:3002"   # Esplora HTTP REST API
    command:
      - --log-filters=INFO
      - --timestamp=true
      - --daemon-rpc-addr=bitcoind:8332
      # Now accurately points to the mounted /data folder where blocks/ and .cookie live
      - --daemon-dir=/data
      - --cookie=${BITCOIN_RPC_USER}:${BITCOIN_RPC_PASSWORD}
      - --electrum-rpc-addr=0.0.0.0:50001
      - --http-addr=0.0.0.0:3002
      - --network=bitcoin
    volumes:
      # Mirrors bitcoind's internal structure perfectly as Read-Only
      - ${BITCOIN_DATA_PATH}:/data:ro
      - ${BITCOIN_BLOCK_DATA_PATH}:/data/blocks:ro
      # Electrs Index DB (Keep on fast SSD!)
      - ${ELECTRS_DB_PATH:-./electrs_db}:/data/db
