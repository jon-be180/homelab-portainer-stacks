version: '3.8'

services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: "@every 1h"
      ND_LOGLEVEL: info  
      ND_BASEURL: ${ND_BASEURL}
    volumes:
      - ${DOCKER_DATA_PATH}/navidrome/data:/data
      - ${DOCKER_MUUSIC_PATH}:/music:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4533/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
  cloudflared-music:
    container_name: navidrome_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    # 1. Added the metrics flag to expose a private local endpoint inside the container
    command: tunnel --metrics localhost:2000 run
    depends_on:
      navidrome:
        condition: service_healthy
    # 2. Added a working healthcheck that queries cloudflared's native local admin utility
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "admin", "http://localhost:2000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
