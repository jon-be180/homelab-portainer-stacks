version: '3.8'

services:
  navidrome_server:
    image: deluan/navidrome:latest
    container_name: navidrome
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: "@every 1h"
      ND_LOGLEVEL: info  
      ND_BASEURL: ${ND_BASEURL}
    volumes:
      - ${DOCKER_DATA_PATH}/navidrome/data:/data
      - ${DOCKER_MUUSIC_PATH}:/music:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4533/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
  navidrome_cloudflared:
    container_name: navidrome_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN} 
      - TUNNEL_METRICS=0.0.0.0:60123
    command: tunnel run
    depends_on:
      navidrome_server: # <-- Changed this from "navidrome" to "navidrome_server"
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
