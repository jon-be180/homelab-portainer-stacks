version: '3.8'

services:
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    volumes:
      - ${DOCKER_DATA_PATH}/jellyfin/config:/config
      - ${DOCKER_DATA_PATH}/jellyfin/cache:/cache
      - ${SHOWS_PATH}:/shows
      - ${MOVIES_PATH}:/movies
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Guatemala
      - JELLYFIN_PublishedServerUrl=${SERVER_IP}
    restart: unless-stopped
    networks:
      - jellyfin-net
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    devices:
      - /dev/dxg:/dev/dxg
    deploy:
      resources:
        limits:
          memory: 4G
    # Fixed: Increased startup grace period & swapped to wget fallback in case curl is absent
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8096/health || wget -qO- http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s # Raised from 30s to 120s to give the database time to spin up

cloudflared:
    container_name: jellyfin_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --metrics 0.0.0.0:2000 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - jellyfin-net
    depends_on:
      jellyfin:
        condition: service_healthy
    # Fixed: Swapped to an alpine-compliant wget command that hits the metrics endpoint cleanly
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  jellyfin-net:
    driver: bridge
