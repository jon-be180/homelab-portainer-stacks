version: '3.8'

services:
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    volumes:
      - ${DOCKER_DATA_PATH}/jellyfin/config:/config
      - ${DOCKER_DATA_PATH}/jellyfin/cache:/cache
      - ${SHOWS_PATH}:/shows
      - ${MOVIES_PATH}:/movies
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Guatemala
      - JELLYFIN_PublishedServerUrl=${SERVER_IP}
    restart: unless-stopped
    networks:
      - jellyfin-net
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    devices:
      - /dev/dxg:/dev/dxg
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8096 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  cloudflared:
    container_name: jellyfin_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Updated: Matches your working stack's command and native admin healthcheck
    command: tunnel --metrics localhost:2000 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - jellyfin-net
    depends_on:
      jellyfin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "admin", "http://localhost:2000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  jellyfin-net:
    driver: bridge
