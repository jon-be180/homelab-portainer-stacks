version: '3.8'

services:
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    volumes:
      - ${DOCKER_DATA_PATH}/jellyfin/config:/config
      - ${DOCKER_DATA_PATH}/jellyfin/cache:/cache
      - ${SHOWS_PATH}:/shows
      - ${MOVIES_PATH}:/movies
    # Fixed: Removed user: "0:0" so PUID/PGID can handle WSL2/Windows mount permissions safely
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Guatemala
      - JELLYFIN_PublishedServerUrl=${SERVER_IP}
    restart: unless-stopped
    networks:
      - jellyfin-net
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    devices:
      - /dev/dxg:/dev/dxg # AMD GPU Pass-through (WSL2 Direct X Graphics)
    deploy:
      resources:
        limits:
          memory: 4G
    # Fixed: Corrected curl flags syntax (-fs)
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cloudflared:
    container_name: jellyfin_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Fixed: Instructs cloudflared to spin up the local diagnostics web server on port 2000
    command: tunnel --metrics localhost:2000 run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - jellyfin-net
    depends_on:
      jellyfin:
        condition: service_healthy
    # Added: Native low-overhead bash network pipe verification to fetch connection status
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/2000 && echo -e 'GET /ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  jellyfin-net:
    driver: bridge
