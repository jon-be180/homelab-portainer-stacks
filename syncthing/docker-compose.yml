version: "3.8"

services:
  syncthing-ssd:
    image: syncthing/syncthing:latest
    container_name: syncthing-ssd
    hostname: syncthing-ssd
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${DOCKER_DATA_PATH}/syncthing/config:/config
      - ${BACKUP_SSD_DATA_PATH}:/var/syncthing
    ports:
      - 8384:8384 # Web UI
      - 22000:22000/tcp # TCP file transfers
      - 22000:22000/udp # QUIC file transfers
      - 21027:21027/udp # Receive local discovery broadcasts
    restart: unless-stopped
    networks:
      - sync-internal

  # Instance 2: The "Backup" on your Spinning Drive
  syncthing-hdd:
    image: syncthing/syncthing:latest
    container_name: syncthing-hdd
    hostname: syncthing-hdd
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${DOCKER_DATA_PATH}/syncthing/hdd_config:/config
      - ${BACKUP_HDD_DATA_PATH}:/var/syncthing  # Point this to your HDD path
    ports:
      - 8385:8384 # Different Web UI port (8385)
      - 22001:22000/tcp # Different transfer port
      - 22001:22000/udp
    restart: unless-stopped
    networks:
      - sync-internal
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8384/rest/system/ping"]
      interval: 1m
      timeout: 10s
      retries: 3

networks:
  sync-internal:
    driver: bridge
