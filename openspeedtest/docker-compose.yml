version: '3.3'
services:
  openspeedtest:
    image: openspeedtest/latest
    container_name: openspeedtest
    restart: unless-stopped
    ports:
      - "3080:3000" # HTTP Access
      - "3443:3001" # HTTPS Access
    environment:
      - TZ=America/Guatemala # Keeping it synced with your local time
      - SET_SERVER_NAME=Jon-Media-Server

  cloudflared:
    container_name: openspeedtest_cloudflared
    image: cloudflare/cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
