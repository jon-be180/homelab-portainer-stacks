version: '3.8'

services:
  openspeedtest:
    image: openspeedtest/latest:latest
    container_name: openspeedtest
    restart: unless-stopped
    ports:
      - "3080:3000" # HTTP Access
      - "3443:3001" # HTTPS Access
    environment:
      - TZ=America/Guatemala
      - SET_SERVER_NAME=Jon-Media-Server
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  cloudflared:
    container_name: openspeedtest_cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Changed: Removed the custom metrics flag since we are using cloudflared's native check command
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      openspeedtest:
        condition: service_healthy
    # Fixed: Uses cloudflared's native diagnostic tool inside the container to safely check connection health
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
