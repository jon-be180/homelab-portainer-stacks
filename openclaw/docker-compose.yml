version: "3.8"

services:
  openclaw-gateway:
    image: openclaw/gateway:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    volumes:
      - ${CONFIG_BASE_DIR}/openclaw:/home/node/.openclaw
    environment:
      - TZ=${TIMEZONE}
      - OPENCLAW_DISABLE_SSRF_GUARD=1
      - OPENCLAW_MODEL_PROVIDER=openai
      # Your MacBook's Static LAN IP
      - OPENCLAW_MODEL_URL=http://MacBook-Pro.local:11434/v1
      - OPENCLAW_MODEL_ID=qwen3-7b
      # Forces the gateway to compress history sooner to save local RAM
      - OPENCLAW_CONTEXT_LIMIT=8192 
    ports:
      - "18789:18789"
